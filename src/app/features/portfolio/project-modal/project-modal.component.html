<div
    class="fixed inset-0 z-50 bg-botanical-bark/60 backdrop-blur-sm flex items-center justify-center p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
    (click)="close.emit()"
>
    <div
        @fadeIn
        class="bg-white rounded-[24px_8px_24px_8px] max-w-2xl w-full p-5 sm:p-6 relative shadow-2xl border border-botanical-sage/10"
        (click)="$event.stopPropagation()"
        cdkTrapFocus
        cdkTrapFocusAutoCapture
    >
        <button
            (click)="close.emit()"
            class="absolute top-3 right-4 text-botanical-bark/40 hover:text-botanical-bark text-2xl transition-colors"
            aria-label="Close project details"
        >
            &times;
        </button>

        <picture>
            <source type="image/webp" [srcset]="webpSrcset" sizes="(max-width: 640px) 640px, 1280px" />
            <img
                [src]="project.image"
                [alt]="project.title"
                [title]="project.title"
                class="w-full h-48 sm:h-64 object-cover rounded-[16px_4px_16px_4px] mb-4"
                loading="lazy"
                width="672"
                height="256"
            />
        </picture>

        <h3 id="modal-title" class="font-display text-xl sm:text-2xl font-bold mb-2 text-botanical-bark">{{ project.title }}</h3>
        <p class="font-body text-botanical-bark/70 mb-4 text-sm sm:text-base">{{ project.description }}</p>

        <div *ngIf="project.tags?.length" class="flex flex-wrap gap-2 mb-4">
            <span
                *ngFor="let tag of project.tags"
                class="font-body text-xs bg-botanical-cream text-botanical-moss px-3 py-1 rounded-full"
            >
                {{ tag }}
            </span>
        </div>

        <div class="flex flex-wrap gap-4">
            <a
                *ngFor="let link of project.links"
                [href]="link.url"
                target="_blank"
                rel="noopener noreferrer"
                class="font-body text-primary hover:text-primary-dark font-medium transition-colors text-sm sm:text-base"
            >
                {{ link.label }} →
            </a>
        </div>
    </div>
</div>
