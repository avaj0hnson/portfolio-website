<section id="portfolio" class="py-16 sm:py-24 bg-white dark:bg-[#0D160A] relative overflow-hidden">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="text-center mb-12 sm:mb-16" appScrollReveal>
            <p class="font-body text-botanical-sage text-xs sm:text-sm uppercase tracking-[0.3em] mb-3">Selected work</p>
            <h2 class="font-display text-3xl sm:text-4xl md:text-5xl font-bold text-botanical-bark dark:text-botanical-cream">
                Portfolio
            </h2>
        </div>

        <div class="flex flex-wrap justify-center gap-2 sm:gap-3 mb-10 sm:mb-14" appScrollReveal revealDelay="0.1s">
            <button
                *ngFor="let cat of categories"
                (click)="setFilter(cat)"
                [ngClass]="{
                    'bg-primary text-white shadow-lg shadow-primary/20': selectedCategory === cat,
                    'bg-botanical-cream dark:bg-[#1A2F1A] text-botanical-bark dark:text-botanical-cream/70 hover:bg-primary/5': selectedCategory !== cat
                }"
                class="font-display font-medium px-5 sm:px-6 py-2 sm:py-2.5 rounded-xl transition-all duration-300 text-xs sm:text-sm"
            >
                {{ cat | titlecase }}
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
            <app-project-card
                *ngFor="let project of filteredProjects; let i = index"
                [project]="project"
                (select)="openProject(project)"
                appScrollReveal
                [revealDelay]="(i * 0.1) + 's'"
            ></app-project-card>
        </div>

        <app-project-modal
            *ngIf="selectedProject"
            [project]="selectedProject"
            (close)="closeModal()"
        ></app-project-modal>
    </div>
</section>
