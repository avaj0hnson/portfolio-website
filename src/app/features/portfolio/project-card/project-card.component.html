<div
    class="group relative bg-white rounded-2xl shadow-sm overflow-hidden cursor-pointer border border-botanical-sage/6 hover:shadow-xl hover:shadow-botanical-leaf/8 transition-shadow duration-500"
    (click)="select.emit()"
    appTilt [tiltIntensity]="5" [tiltScale]="1.02"
>
    <div
        *ngIf="project.inProgress"
        class="absolute top-3 left-3 bg-accent text-white text-[10px] font-display font-semibold px-3 py-1 rounded-lg shadow z-10 uppercase tracking-wider"
    >
        In Progress
    </div>

    <div class="overflow-hidden">
        <picture>
            <source type="image/webp" [srcset]="webpSrcset" sizes="(max-width: 640px) 640px, 1280px" />
            <img
                [src]="project.image"
                [alt]="project.title"
                [title]="project.title"
                class="w-full h-44 sm:h-52 object-cover transition-transform duration-700 ease-out group-hover:scale-110"
                loading="lazy"
                width="640"
                height="208"
            />
        </picture>
    </div>

    <div class="p-5 sm:p-6">
        <h3 class="font-display text-base sm:text-lg font-bold mb-2 text-botanical-bark">{{ project.title }}</h3>
        <p class="font-body text-sm text-botanical-bark/50 mb-4 line-clamp-2 leading-relaxed">{{ project.description }}</p>

        <div *ngIf="project.links?.length" class="flex flex-wrap gap-3">
            <a
                *ngFor="let link of project.links"
                [href]="link.url"
                target="_blank"
                rel="noopener noreferrer"
                class="font-display text-primary text-xs sm:text-sm font-semibold hover:text-primary-light transition-colors group/link"
                (click)="$event.stopPropagation()"
            >
                {{ link.label }}
                <span class="inline-block transition-transform group-hover/link:translate-x-0.5">→</span>
            </a>
        </div>
    </div>
</div>
