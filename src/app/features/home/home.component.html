<div class="carousel-wrapper relative h-screen w-full overflow-hidden">

    <div class="overlay"></div>

    <swiper-container
        slides-per-view="1"
        loop="true"
        autoplay="true"
        class="mySwiper absolute inset-0 w-full h-full z-0"
    >
        <swiper-slide>
            <picture>
                <source type="image/webp" srcset="img/slide1-640w.webp 640w, img/slide1-1280w.webp 1280w, img/slide1.webp 1920w" sizes="100vw" />
                <img src="img/slide1.jpg" class="w-full h-full object-cover" alt="Lush green foliage background" loading="eager" width="1920" height="1080" />
            </picture>
        </swiper-slide>
        <swiper-slide>
            <picture>
                <source type="image/webp" srcset="img/slide2-640w.webp 640w, img/slide2-1280w.webp 1280w, img/slide2.webp 1920w" sizes="100vw" />
                <img src="img/slide2.jpg" class="w-full h-full object-cover" alt="Nature-inspired workspace scene" loading="lazy" width="1920" height="1080" />
            </picture>
        </swiper-slide>
        <swiper-slide>
            <picture>
                <source type="image/webp" srcset="img/slide3-640w.webp 640w, img/slide3-1280w.webp 1280w, img/slide3.webp 1920w" sizes="100vw" />
                <img src="img/slide3.jpg" class="w-full h-full object-cover" alt="Serene landscape with greenery" loading="lazy" width="1920" height="1080" />
            </picture>
        </swiper-slide>
    </swiper-container>

    <div class="titleMessage flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="heading mb-4">
            <p class="main">AVA JOHNSON</p>
            <p class="sub"><span #typedElement></span></p>
        </div>
    
        <div class="flex gap-4 mt-6">
            <button
                class="bg-primary text-white px-6 py-2 rounded shadow-md hover:bg-primary-dark transform hover:scale-105 transition duration-200 ease-in-out"
                (click)="scrollToPortfolio()"
                >
                Portfolio
            </button>

            <a
                href="https://linkedin.com/in/avaj0hnson"
                target="_blank"
                rel="noopener"
                class="px-6 py-2 border border-white text-white rounded transform hover:scale-105 hover:bg-white hover:text-primary transition duration-200 ease-in-out"
            >
                LinkedIn
            </a>
        </div>
    </div>
</div>
<app-skills></app-skills>
<app-portfolio></app-portfolio>
<app-contact></app-contact>
