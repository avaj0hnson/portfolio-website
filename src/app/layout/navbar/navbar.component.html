<nav
    class="fixed top-0 left-0 w-full z-50 transition-all duration-500"
    [ngClass]="{
        'bg-transparent': !isScrolled && !isMenuOpen,
        'bg-botanical-cream/95 dark:bg-botanical-midnight/95 backdrop-blur-md shadow-sm': isScrolled || isMenuOpen
    }"
    aria-label="Main navigation"
>
    <div class="max-w-6xl mx-auto px-4 py-3 sm:py-4 flex items-center justify-between">
        <!-- Logo / Brand -->
        <div
            class="flex items-center gap-2 text-lg sm:text-xl font-display font-semibold transition-colors duration-300"
            [ngClass]="{ 'text-botanical-cream': !isScrolled && !isMenuOpen, 'text-primary dark:text-botanical-sage': isScrolled || isMenuOpen }"
        >
            <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" class="shrink-0">
                <path d="M12 2C9 5 7 9 7 13s2 7 5 10c3-3 5-7 5-10s-2-8-5-11z" [attr.fill]="isScrolled || isMenuOpen ? '#2D5A27' : '#87A878'"/>
                <line x1="12" y1="8" x2="12" y2="22" [attr.stroke]="isScrolled || isMenuOpen ? '#4A7C59' : '#6B8F71'" stroke-width="1.5"/>
            </svg>
            Ava Johnson
        </div>

        <!-- Desktop nav -->
        <div class="hidden md:flex items-center gap-5 lg:gap-6">
            <a
                *ngFor="let section of ['about', 'skills', 'portfolio', 'contact']"
                class="font-body text-sm cursor-pointer transition-colors duration-300 hover:opacity-80"
                [ngClass]="{ 'text-botanical-cream/80 hover:text-botanical-cream': !isScrolled, 'text-botanical-bark dark:text-botanical-cream/80 hover:text-primary dark:hover:text-botanical-sage': isScrolled }"
                role="button"
                tabindex="0"
                (click)="scrollTo(section)"
                (keydown.enter)="scrollTo(section)"
            >
                {{ section | titlecase }}
            </a>

            <!-- Social icons -->
            <a
                href="https://linkedin.com/in/avaj0hnson"
                aria-label="LinkedIn profile"
                target="_blank"
                rel="noopener noreferrer"
                class="text-lg transition-colors duration-300"
                [ngClass]="{ 'text-botanical-cream/70 hover:text-botanical-cream': !isScrolled, 'text-botanical-bark/60 dark:text-botanical-cream/70 hover:text-primary dark:hover:text-botanical-sage': isScrolled }"
            >
                <i class="fab fa-linkedin-in" aria-hidden="true"></i>
            </a>
            <a
                href="https://github.com/avaj0hnson"
                aria-label="GitHub profile"
                target="_blank"
                rel="noopener noreferrer"
                class="text-lg transition-colors duration-300"
                [ngClass]="{ 'text-botanical-cream/70 hover:text-botanical-cream': !isScrolled, 'text-botanical-bark/60 dark:text-botanical-cream/70 hover:text-primary dark:hover:text-botanical-sage': isScrolled }"
            >
                <i class="fab fa-github" aria-hidden="true"></i>
            </a>

            <!-- Theme toggle -->
            <button
                (click)="toggleTheme()"
                class="w-8 h-8 flex items-center justify-center rounded-full transition-all duration-300 hover:scale-110"
                [ngClass]="{ 'text-botanical-cream/70 hover:text-botanical-cream': !isScrolled, 'text-botanical-bark/60 dark:text-botanical-cream/70 hover:text-primary dark:hover:text-botanical-sage': isScrolled }"
                [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
            >
                <svg [class.hidden]="isDark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg [class.hidden]="!isDark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>

            <!-- Resume -->
            <a
                href="https://docs.google.com/document/d/1Syuvef_3hPk3_LkNC-yJNFXM0bmKfqBAzakbINax8qc/edit?usp=sharing"
                target="_blank"
                rel="noopener noreferrer"
                class="font-body bg-primary text-white px-4 py-2 rounded-full hover:bg-primary-light text-sm transition-all duration-300 hover:scale-105"
            >
                Resume
            </a>
        </div>

        <!-- Mobile: theme toggle + hamburger -->
        <div class="flex md:hidden items-center gap-2">
            <button
                (click)="toggleTheme()"
                class="w-8 h-8 flex items-center justify-center rounded-full transition-all duration-300"
                [ngClass]="{ 'text-botanical-cream/70': !isScrolled && !isMenuOpen, 'text-botanical-bark/60 dark:text-botanical-cream/70': isScrolled || isMenuOpen }"
                [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
            >
                <svg [class.hidden]="isDark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg [class.hidden]="!isDark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button
                class="text-2xl transition-colors duration-300"
                [ngClass]="{ 'text-botanical-cream': !isScrolled && !isMenuOpen, 'text-botanical-bark dark:text-botanical-cream/80': isScrolled || isMenuOpen }"
                (click)="isMenuOpen = !isMenuOpen"
                [attr.aria-expanded]="isMenuOpen"
                aria-controls="mobile-menu"
                aria-label="Toggle navigation menu"
            >
                {{ isMenuOpen ? '✕' : '☰' }}
            </button>
        </div>
    </div>

    <!-- Mobile dropdown -->
    <div
        id="mobile-menu"
        *ngIf="isMenuOpen"
        class="md:hidden px-4 pb-4 bg-botanical-cream/95 dark:bg-botanical-midnight/95 backdrop-blur-md flex flex-col gap-3 text-sm"
        role="menu"
    >
        <a
            *ngFor="let section of ['about', 'skills', 'portfolio', 'contact']"
            (click)="scrollTo(section)"
            (keydown.enter)="scrollTo(section)"
            class="font-body text-botanical-bark dark:text-botanical-cream/80 hover:text-primary dark:hover:text-botanical-sage cursor-pointer py-1 transition-colors"
            role="menuitem"
            tabindex="0"
        >
            {{ section | titlecase }}
        </a>
        <a href="https://linkedin.com/in/avaj0hnson" aria-label="LinkedIn profile" target="_blank" rel="noopener noreferrer" class="font-body text-botanical-bark dark:text-botanical-cream/80 hover:text-primary dark:hover:text-botanical-sage py-1" role="menuitem">LinkedIn</a>
        <a href="https://github.com/avaj0hnson" aria-label="GitHub profile" target="_blank" rel="noopener noreferrer" class="font-body text-botanical-bark dark:text-botanical-cream/80 hover:text-primary dark:hover:text-botanical-sage py-1" role="menuitem">GitHub</a>
        <a
            href="https://docs.google.com/document/d/1Syuvef_3hPk3_LkNC-yJNFXM0bmKfqBAzakbINax8qc/edit?usp=sharing"
            target="_blank"
            rel="noopener noreferrer"
            class="font-body bg-primary text-white text-center px-4 py-2.5 rounded-full hover:bg-primary-light transition-all"
            role="menuitem"
        >
            Resume
        </a>
    </div>
</nav>
